<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg_scale" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f0fdfa"/>
        <stop offset="100%" stop-color="#ccfbf1"/>
      </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg_scale)"/>
    <!-- Precision tray baby scale -->
    <g transform="translate(100, 80)" filter="drop-shadow(0px 8px 16px rgba(0,0,0,0.06))">
      <path d="M 0 30 Q 100 0 200 30 L 200 45 Q 100 20 0 45 Z" fill="#fff" stroke="#0d9488" stroke-width="4"/>
      <!-- Base scale -->
      <rect x="50" y="45" width="100" height="50" rx="8" fill="#e2e8f0"/>
      <rect x="70" y="55" width="60" height="24" rx="3" fill="#1e293b"/>
      <text x="100" y="72" font-family="system-ui" font-size="12" font-weight="800" fill="#00d2c4" text-anchor="middle">12.5 lbs</text>
    </g>
  </svg>