<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg_bp" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f8fafc"/>
        <stop offset="100%" stop-color="#e2e8f0"/>
      </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg_bp)"/>
    <g transform="translate(130, 60)" filter="drop-shadow(0px 8px 20px rgba(0,0,0,0.1))">
      <!-- Digital reader cuff device -->
      <rect x="0" y="10" width="80" height="100" rx="12" fill="#fff" stroke="#94a3b8" stroke-width="4"/>
      <rect x="10" y="20" width="60" height="50" rx="4" fill="#1e293b"/>
      <text x="40" y="40" font-family="system-ui" font-weight="700" font-size="12" fill="#00d2c4" text-anchor="middle">120/80</text>
      <!-- Buttons -->
      <circle cx="30" cy="85" r="8" fill="#dc2626"/>
      <circle cx="55" cy="85" r="6" fill="#94a3b8"/>
      <!-- Arm cuff ribbon -->
      <path d="M 80 60 Q 120 40 140 70 T 170 90" fill="none" stroke="#475569" stroke-width="12" stroke-linecap="round"/>
    </g>
  </svg>